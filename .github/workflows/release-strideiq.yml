name: "Release - Deploy StrideIQ to EKS"

on:
  workflow_dispatch: # Manual trigger from the GitHub Actions UI
  repository_dispatch: # Triggered via API from another CI/CD pipeline or DockerHub webhook
    types: [release-strideiq]

env:
  AWS_REGION: "us-east-1"
  CLUSTER_NAME: "eks-prod"
  IMAGE: "ichancetek/strideiq:latest"
  DEPLOYMENT_NAME: "strideiq"
  NAMESPACE: "default"

permissions:
  id-token: write
  contents: read

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1: Verify Image Exists on DockerHub
  # ─────────────────────────────────────────────────────────────
  verify-image:
    name: "Verify Docker Image"
    runs-on: ubuntu-latest
    steps:
      - name: Check that ichancetek/strideiq:latest exists on DockerHub
        run: |
          echo "Verifying image: ${{ env.IMAGE }}"
          docker manifest inspect ${{ env.IMAGE }} > /dev/null
          echo "✅ Image verified on DockerHub!"

  # ─────────────────────────────────────────────────────────────
  # JOB 2: Deploy to Primary EKS (us-east-1)
  # ─────────────────────────────────────────────────────────────
  deploy-primary:
    name: "Deploy to Primary (us-east-1)"
    runs-on: ubuntu-latest
    needs: verify-image
    environment: production

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::777311273950:role/GitHubActions-Terraform-Role
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Configure kubectl for EKS
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.CLUSTER_NAME }}

      - name: Deploy StrideIQ Manifest
        run: kubectl apply -f terraform-eks/k8s/strideiq-deployment.yaml

      - name: Force Rollout of Latest Image
        run: kubectl rollout restart deployment/${{ env.DEPLOYMENT_NAME }} -n ${{ env.NAMESPACE }}

      - name: Wait for Rollout to Complete
        run: kubectl rollout status deployment/${{ env.DEPLOYMENT_NAME }} -n ${{ env.NAMESPACE }} --timeout=5m

      - name: Verify Pods are Running
        run: |
          echo "--- Pod Status ---"
          kubectl get pods -l app=${{ env.DEPLOYMENT_NAME }} -n ${{ env.NAMESPACE }}
          echo ""
          echo "--- Service & Load Balancer URL ---"
          kubectl get svc strideiq-service -n ${{ env.NAMESPACE }}

  # ─────────────────────────────────────────────────────────────
  # JOB 3: Deploy to DR EKS (us-west-2)
  # ─────────────────────────────────────────────────────────────
  deploy-dr:
    name: "Deploy to DR (us-west-2)"
    runs-on: ubuntu-latest
    needs: deploy-primary # Only deploy to DR after primary succeeds!

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::777311273950:role/GitHubActions-Terraform-Role
          aws-region: us-west-2

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Configure kubectl for DR EKS
        run: aws eks update-kubeconfig --region us-west-2 --name eks-prod-dr

      - name: Deploy StrideIQ Manifest
        run: kubectl apply -f terraform-eks/k8s/strideiq-deployment.yaml

      - name: Force Rollout of Latest Image
        run: kubectl rollout restart deployment/${{ env.DEPLOYMENT_NAME }} -n ${{ env.NAMESPACE }}

      - name: Wait for Rollout to Complete
        run: kubectl rollout status deployment/${{ env.DEPLOYMENT_NAME }} -n ${{ env.NAMESPACE }} --timeout=5m

      - name: Verify Pods are Running
        run: |
          echo "--- DR Pod Status ---"
          kubectl get pods -l app=${{ env.DEPLOYMENT_NAME }} -n ${{ env.NAMESPACE }}
          echo ""
          echo "--- DR Service & Load Balancer URL ---"
          kubectl get svc strideiq-service -n ${{ env.NAMESPACE }}
