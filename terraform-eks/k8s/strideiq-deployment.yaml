apiVersion: apps/v1
kind: Deployment
metadata:
  name: strideiq
  labels:
    app: strideiq
spec:
  replicas: 2
  selector:
    matchLabels:
      app: strideiq
  template:
    metadata:
      labels:
        app: strideiq
    spec:
      containers:
      - name: strideiq
        image: ichancetek/strideiq:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80 # Adjust this if your app runs on a different port!
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: strideiq-service
spec:
  type: LoadBalancer # This automatically creates an AWS Load Balancer so you can access it via the internet
  selector:
    app: strideiq
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80 # Adjust this if your app runs on a different port!
